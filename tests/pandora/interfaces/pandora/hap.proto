syntax = "proto3";

package pandora;

import "pandora/host.proto";
option java_outer_classname = "HapProto";
import "google/protobuf/empty.proto";

service HAP {
  rpc GetFeatures(GetFeaturesRequest) returns (GetFeaturesResponse);
  rpc SetActivePreset(SetActivePresetRequest) returns (google.protobuf.Empty);
  rpc SetActivePresetForGroup(SetActivePresetForGroupRequest) returns (google.protobuf.Empty);
  rpc GetActivePreset(GetActivePresetRequest) returns (GetActivePresetResponse);
  rpc SetNextPreset(SetNextPresetRequest) returns (google.protobuf.Empty);
  rpc SetPreviousPreset(SetPreviousPresetRequest) returns (google.protobuf.Empty);
  rpc WritePresetName(WritePresetNameRequest) returns (google.protobuf.Empty);
  rpc GetPreset(GetPresetRequest) returns (GetPresetResponse);
  rpc GetAllPresets(GetAllPresetsRequest) returns (GetAllPresetsResponse);
  rpc WaitPresetChanged(google.protobuf.Empty) returns (WaitPresetChangedResponse);
  rpc WaitActivePresetChanged(WaitActivePresetChangedRequest) returns (google.protobuf.Empty);
  rpc WaitPeripheral(WaitPeripheralRequest) returns (google.protobuf.Empty);
}

message GetFeaturesRequest {
  Connection connection = 1;
}

message GetFeaturesResponse {
  int32 features = 1;
}

message SetActivePresetRequest {
  Connection connection = 1;
  uint32 index = 2;
}

message SetActivePresetForGroupRequest {
  Connection connection = 1;
  uint32 index = 2;
}

message GetActivePresetRequest {
  Connection connection = 1;
}

message GetActivePresetResponse {
  PresetRecord preset_record = 1;
}

message SetNextPresetRequest {
  Connection connection = 1;
}

message SetPreviousPresetRequest {
  Connection connection = 1;
}

message GetPresetRequest {
  Connection connection = 1;
  uint32 index = 2;
}

message PresetRecord {
  uint32 index = 1;
  string name = 2;
  bool isWritable = 3;
  bool isAvailable = 4;
}

message GetPresetResponse {
  PresetRecord preset_record = 1;
}

message GetAllPresetsRequest {
  Connection connection = 1;
}

message GetAllPresetsResponse {
  repeated PresetRecord preset_record_list = 1;
}

message WritePresetNameRequest {
  Connection connection = 1;
  uint32 index = 2;
  string name = 3;
}

message WaitPresetChangedResponse {
  Connection connection = 1;
  repeated PresetRecord preset_record_list = 2;
  uint32 reason = 3;
}

message WaitActivePresetChangedRequest {
  Connection connection = 1;
  uint32 index = 2;
}

message WaitPeripheralRequest {
  Connection connection = 1;
}

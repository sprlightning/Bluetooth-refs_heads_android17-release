syntax = "proto3";

package pandora;

option java_outer_classname = "MapClientProto";

import "pandora/host.proto";
import "google/protobuf/empty.proto";

service MapClient {
  // Set connection policy for the profile
  rpc SetConnectionPolicy(SetConnectionPolicyRequest) returns (google.protobuf.Empty);
  // Send a message to the connected MSE
  rpc SendMessage(SendMessageRequest) returns (google.protobuf.Empty);
}

message SetConnectionPolicyRequest {
  Connection connection = 1;
  ConnectionPolicy policy = 2;
}

enum ConnectionPolicy {
  CONNECTION_POLICY_ALLOWED = 0;
  CONNECTION_POLICY_FORBIDDEN = 1;
}

message SendMessageRequest {
  Connection connection = 1;
  string phoneNumber = 2;
  string message = 3;
}

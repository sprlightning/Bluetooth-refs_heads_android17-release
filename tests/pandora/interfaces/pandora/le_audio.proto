syntax = "proto3";

import "pandora/host.proto";
import "google/protobuf/empty.proto";

option java_outer_classname = "LeAudioProto";

package pandora;

// Service to trigger LE Audio procedures.
service LeAudio {
  rpc Open(OpenRequest) returns (google.protobuf.Empty);
  // Playback audio
  rpc LeAudioPlaybackAudio(stream LeAudioPlaybackAudioRequest)
      returns (LeAudioPlaybackAudioResponse);
  // Start an opened stream.
  rpc LeAudioStart(LeAudioStartRequest) returns (google.protobuf.Empty);
  // Stop an opened stream.
  rpc LeAudioStop(LeAudioStopRequest) returns (google.protobuf.Empty);
  // Stop an opened recorder.
  rpc LeAudioStopRecorder(LeAudioStopRecorderRequest) returns (google.protobuf.Empty);
  // Capture audio
  rpc LeAudioCaptureAudio(LeAudioCaptureAudioRequest) returns (stream LeAudioCaptureAudioResponse);
  // Prepare recorder
  rpc LeAudioPrepareRecorder(LeAudioPrepareRecorderRequest) returns (google.protobuf.Empty);
  // Wait for a group stream status change
  rpc LeAudioWaitGroupStreamStatusChanged(LeAudioWaitGroupStreamStatusChangedRequest)
      returns (google.protobuf.Empty);
  // Get ringer mode
  rpc LeAudioGetRingerMode(google.protobuf.Empty) returns (LeAudioGetRingerModeResponse);
  // Set ringer mode
  rpc LeAudioSetRingerMode(LeAudioSetRingerModeRequest) returns (google.protobuf.Empty);
}

enum AudioUsage {
  AUDIO_USAGE_UNKNOWN = 0;
  AUDIO_USAGE_MEDIA = 1;
  AUDIO_USAGE_VOICE_COMMUNICATION = 2;
  AUDIO_USAGE_VOICE_COMMUNICATION_SIGNALLING = 3;
  AUDIO_USAGE_ALARM = 4;
  AUDIO_USAGE_NOTIFICATION = 5;
  AUDIO_USAGE_NOTIFICATION_RINGTONE = 6;
  AUDIO_USAGE_NOTIFICATION_COMMUNICATION_REQUEST = 7;
  AUDIO_USAGE_NOTIFICATION_COMMUNICATION_INSTANT = 8;
  AUDIO_USAGE_NOTIFICATION_COMMUNICATION_DELAYED = 9;
  AUDIO_USAGE_NOTIFICATION_EVENT = 10;
  AUDIO_USAGE_ASSISTANCE_ACCESSIBILITY = 11;
  AUDIO_USAGE_ASSISTANCE_NAVIGATION_GUIDANCE = 12;
  AUDIO_USAGE_ASSISTANCE_SONIFICATION = 13;
  AUDIO_USAGE_GAME = 14;
  AUDIO_USAGE_VIRTUAL_SOURCE = 15;
  AUDIO_USAGE_ASSISTANT = 16;
  AUDIO_USAGE_CALL_ASSISTANT = 17;
}

enum AudioSource {
  AUDIO_SOURCE_DEFAULT = 0;
  AUDIO_SOURCE_MIC = 1;
  AUDIO_SOURCE_VOICE_UPLINK = 2;
  AUDIO_SOURCE_VOICE_DOWNLINK = 3;
  AUDIO_SOURCE_VOICE_CALL = 4;
  AUDIO_SOURCE_CAMCORDER = 5;
  AUDIO_SOURCE_VOICE_RECOGNITION = 6;
  AUDIO_SOURCE_VOICE_COMMUNICATION = 7;
  AUDIO_SOURCE_REMOTE_SUBMIX = 8;
  AUDIO_SOURCE_UNPROCESSED = 9;
  AUDIO_SOURCE_VOICE_PERFORMANCE = 10;
}

enum GroupStreamStatus {
  GROUP_STREAM_STATUS_IDLE = 0;
  GROUP_STREAM_STATUS_STREAMING = 1;
}

enum RingerMode {
  RINGER_MODE_SILENT = 0;
  RINGER_MODE_VIBRATE = 1;
  RINGER_MODE_NORMAL = 2;
}

message OpenRequest {
  Connection connection = 1;
}

// Request for the `LeAudioStart` method.
message LeAudioStartRequest {
  Connection connection = 1;
  AudioUsage audioUsage = 2;
  string metadataTag = 3;
}

// Request of the `PlaybackAudio` method.
message LeAudioPlaybackAudioRequest {
  // Audio data to playback.
  bytes data = 1;
}

// Response of the `LeAudioPlaybackAudio` method.
message LeAudioPlaybackAudioResponse {}

// Request of the `LeAudioStop` method.
message LeAudioStopRequest {
  Connection connection = 1;
}

// Request of the `LeAudioCaptureAudio` method.
message LeAudioCaptureAudioRequest {
  Connection connection = 1;
}

// Response of the `LeAudioCaptureAudio` method.
message LeAudioCaptureAudioResponse {
  bytes data = 1;
}

// Request of the `LeAudioPrepareRecorder` method.
message LeAudioPrepareRecorderRequest {
  Connection connection = 1;
  AudioSource audioSource = 2;
}

// Request of the `LeAudioStopRecorder` method.
message LeAudioStopRecorderRequest {
  Connection connection = 1;
}

// Request of the `LeAudioWaitGroupStreamStatusChanged` method.
message LeAudioWaitGroupStreamStatusChangedRequest {
  Connection connection = 1;
  GroupStreamStatus groupStreamStatus = 2;
}

// Response of the `LeAudioGetSilentMode` method.
message LeAudioGetRingerModeResponse {
  RingerMode ringerMode = 1;
}

// Request of the `LeAudioSetRingerMode` method.
message LeAudioSetRingerModeRequest {
  RingerMode ringerMode = 1;
}

syntax = "proto3";

option java_package = "com.android.bluetooth";
option java_outer_classname = "BluetoothLeAudioStorageProtos";

// Holds the preferred codec parameters and the priority
message CodecConfig {
  int32 codec_type = 1;
  int32 codec_priority = 2;
  int32 sample_rate = 3;
  int32 bits_per_sample = 4;
  int32 channel_count = 5;
  int32 frame_duration = 6;
  int32 octets_per_frame = 7;
  int32 min_octets_per_frame = 8;
  int32 max_octets_per_frame = 9;
}

message CodecConfigList {
  repeated CodecConfig configs = 1;
}
